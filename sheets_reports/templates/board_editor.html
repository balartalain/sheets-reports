{% extends "base.html" %}
{% load static %}

{% block title %}Report IA — Editor de tablero{% endblock %}

{% block header_actions %}{% endblock %}

{% block content %}

<style>
  #dashboard-canvas {
    background-origin: content-box;
    background-image: repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent calc(100% / 12),
        rgba(148, 163, 184, 0.07) calc(100% / 12),
        rgba(148, 163, 184, 0.07) calc(100% / 12 * 2)
    );
  }
  .grid-ghost-preview {
    background-color: #f1f5f9 !important;
    border: 2px dashed #cbd5e1 !important;
    border-radius: 0.75rem;
    opacity: 0.5;
    min-height: 10px !important;
    grid-column: span var(--ghost-span, 6) / span var(--ghost-span, 6) !important;
  }
</style>

<div class="flex h-[calc(100vh-64px)] w-full overflow-hidden">

  <aside class="w-72 bg-white border-r border-line p-5 flex flex-col justify-between shadow-sm z-10">
    <div>
      <div class="mb-6">
        <h2 class="text-base font-bold text-ink">Módulos Disponibles</h2>
        <p class="text-xs text-ink/50 mt-1">Arrastra múltiples bloques al lienzo para estructurar tus métricas.</p>
      </div>

      <div id="sidebar-components" class="space-y-3">
      </div>
    </div>

  </aside>

  <main class="flex-1 p-6 overflow-y-auto flex flex-col">
    <div class="flex justify-end gap-2 mb-5">
      <button onclick="window.location.href='/'" class="bg-white border border-line hover:bg-paper text-ink/70 py-2.5 px-4 rounded-xl font-medium text-sm transition cursor-pointer flex items-center gap-1.5">
        <i class="ti ti-logout" aria-hidden="true"></i>
        Salir del editor
      </button>
      <button id="share-btn" class="bg-white border border-line hover:bg-paper text-ink/70 py-2.5 px-4 rounded-xl font-medium text-sm transition cursor-pointer">
        Compartir
      </button>
      <button id="save-btn" class="bg-moss-500 hover:bg-moss-600 text-white py-2.5 px-4 rounded-xl font-medium text-sm transition shadow-sm cursor-pointer">
        Guardar Diseño
      </button>
    </div>

    <div id="dashboard-canvas" class="grid grid-cols-12 gap-4 content-start grow shrink-0 bg-paper border-2 border-dashed border-line rounded-xl p-4 min-h-0">
    </div>
  </main>

</div>

<div id="drawer-overlay" x-data x-show="$store.dashboard.editingId" x-on:click="$store.dashboard.closeDrawer()" x-cloak
     class="fixed inset-0 bg-ink/20 z-40" x-transition.opacity></div>

<div id="edit-drawer" x-data
     x-bind:class="$store.dashboard.editingId ? 'translate-x-0' : 'translate-x-full'"
     class="fixed top-0 right-0 h-full w-80 bg-white shadow-xl border-l border-line z-50 transition-transform duration-300">
  <div class="p-5">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-sm font-bold text-ink">Editar Propiedades</h3>
      <button x-on:click="$store.dashboard.closeDrawer()" class="text-ink/40 hover:text-ink transition cursor-pointer text-sm">✕</button>
    </div>

    <div class="space-y-4">
      <template x-for="field in $store.dashboard.drawerFields" :key="field.key">
        <div>
          <label class="block text-xs font-semibold text-ink/70 mb-1" x-text="field.label"></label>

          <template x-if="field.type === 'text'">
            <input type="text" x-model="$store.dashboard.drawerDraft[field.key]"
                   class="w-full text-sm border border-line rounded-lg px-3 py-2 focus:outline-none focus:border-moss-500">
          </template>

          <template x-if="field.type === 'number'">
            <input type="number" x-model.number="$store.dashboard.drawerDraft[field.key]"
                   x-bind:min="field.min" x-bind:step="field.step || 1"
                   class="w-full text-sm border border-line rounded-lg px-3 py-2 focus:outline-none focus:border-moss-500">
          </template>

          <template x-if="field.type === 'select'">
            <select x-model="$store.dashboard.drawerDraft[field.key]"
                    x-init="field.optionsSource && $watch('$store.dashboard.availableFunctions', () => $el.dispatchEvent(new Event('change')))"
                    class="w-full text-sm border border-line rounded-lg px-3 py-2 focus:outline-none focus:border-moss-500">
              <template x-if="field.emptyOption">
                <option x-bind:value="field.emptyOption.value" x-text="field.emptyOption.label"></option>
              </template>
              <template x-for="opt in (field.optionsSource ? $store.dashboard[field.optionsSource] : field.options)"
                        :key="field.optionsSource ? opt[field.optionValueKey || 'value'] : opt.value">
                <option x-bind:value="opt[field.optionValueKey || 'value']" x-text="opt[field.optionLabelKey || 'label']"></option>
              </template>
            </select>
          </template>

          <template x-if="field.type === 'checkbox'">
            <input type="checkbox" x-model="$store.dashboard.drawerDraft[field.key]"
                   class="h-4 w-4 rounded border-line text-moss-600 focus:ring-moss-500">
          </template>
        </div>
      </template>
    </div>

    <div class="pt-4 border-t border-line mt-6 flex space-x-2">
      <button x-on:click="$store.dashboard.closeDrawer()" class="flex-1 text-sm font-medium text-ink/60 bg-paper hover:bg-line rounded-lg py-2 transition cursor-pointer">Cancelar</button>
      <button x-on:click="$store.dashboard.saveDrawer()" class="flex-1 text-sm font-medium text-white bg-moss-500 hover:bg-moss-600 rounded-lg py-2 transition cursor-pointer">Guardar</button>
    </div>
  </div>
</div>

<script>
  window.DASHBOARD_ID = {{ board_id }};
  window.SHARE_PATH = "{% url 'board_view' board_slug=dashboard.slug %}";
</script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet">
<link href="{% static 'sheets_reports/css/tabulator.css' %}" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>

<script src="{% static 'sheets_reports/js/board_editor/base-widget.js' %}"></script>
<script src="{% static 'sheets_reports/js/board_editor/widget-registry.js' %}"></script>

<script src="{% static 'sheets_reports/js/board_editor/widgets/bar-widget.js' %}"></script>
<script src="{% static 'sheets_reports/js/board_editor/widgets/line-widget.js' %}"></script>
<script src="{% static 'sheets_reports/js/board_editor/widgets/donut-widget.js' %}"></script>
<script src="{% static 'sheets_reports/js/board_editor/widgets/kpi-widget.js' %}"></script>
<script src="{% static 'sheets_reports/js/board_editor/widgets/filter-widget.js' %}"></script>
<script src="{% static 'sheets_reports/js/board_editor/widgets/table-widget.js' %}"></script>

<script src="{% static 'sheets_reports/js/board_editor/dashboard-store.js' %}"></script>
<script src="{% static 'sheets_reports/js/board_editor/board-editor-init.js' %}"></script>

{% endblock %}
